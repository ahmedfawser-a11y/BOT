<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partial Embed without Header</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            top: 60%; /* Adjust this value to skip the header */
            left: 0;
            width: 100%;
            height: 40vh; /* Adjust this value to display the content below the header */
            border: none;
            pointer-events: none; /* Optional: disables interaction */
        }
    </style>
</head>
<body>

    <iframe 
        src="https://www.oxaam.com/aadubcode11.php" 
        scrolling="no"
    ></iframe>

</body>
</html>
